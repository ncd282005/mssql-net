name: Docker Hub CI/CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/aspnet-mssql:latest ./app/aspnetapp

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/aspnet-mssql:latest

      - name: Deploy
        run: |
          docker compose down
          docker pull ${{ secrets.DOCKER_USERNAME }}/aspnet-mssql:latest
          docker compose up -d