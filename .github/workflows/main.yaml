name: Docker Hub CI/CD Localhost

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/aspnet-mssql:latest ./app/aspnetapp

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/aspnet-mssql:latest

      - name: Stop Old Containers
        run: docker compose down

      - name: Pull Latest Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/aspnet-mssql:latest

      - name: Start Updated Containers
        run: docker compose up -d